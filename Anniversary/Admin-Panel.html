<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Anniversary Profile Maker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #006400 0%, #228B22 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Login Page Styles */
        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
            padding: 40px;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header img {
            width: 100px;
            height: 100px;
            border-radius: 30%;
            margin-bottom: 15px;
            border: 3px solid #006400;
        }

        .login-header h2 {
            color: #333;
            font-size: 24px;
            margin-bottom: 5px;
        }

        .login-header p {
            color: #666;
            font-size: 14px;
        }

        .login-form .form-group {
            margin-bottom: 20px;
        }

        .login-form label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        .login-form .input-wrapper {
            position: relative;
        }

        .login-form .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #006400;
            font-size: 16px;
        }

        .login-form input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .login-form input:focus {
            border-color: #006400;
            outline: none;
            box-shadow: 0 0 0 3px rgba(0,100,0,0.1);
        }

        .login-form button {
            width: 100%;
            padding: 15px;
            background: #006400;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .login-form button:hover {
            background: #228B22;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,100,0,0.3);
        }

        .login-form button:disabled {
            background: #cccccc;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
            align-items: center;
            gap: 8px;
        }

        .error-message.show {
            display: flex;
        }

        .info-message {
            background: #d1ecf1;
            color: #0c5460;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
            align-items: center;
            gap: 8px;
        }

        .info-message.show {
            display: flex;
        }

        /* Admin Panel Styles */
        .admin-container {
            width: 100%;
            max-width: 1200px;
            display: none;
        }

        .admin-header {
            background: white;
            padding: 20px 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .admin-header h1 {
            color: #333;
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .admin-header h1 i {
            color: #006400;
        }

        .admin-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .admin-email {
            color: #666;
            font-size: 14px;
            background: #f0f0f0;
            padding: 8px 15px;
            border-radius: 20px;
        }

        .logout-btn {
            padding: 10px 20px;
            background: #f44336;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: #da190b;
            transform: translateY(-2px);
        }

        .upload-panel {
            background: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .upload-panel h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 22px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .upload-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .upload-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            border: 2px dashed #006400;
        }

        .upload-card h3 {
            color: #006400;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .file-input-wrapper {
            position: relative;
            margin: 15px 0;
        }

        .file-input-wrapper input[type=file] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .file-input-label {
            display: block;
            padding: 15px;
            background: white;
            border: 2px solid #006400;
            border-radius: 8px;
            text-align: center;
            color: #006400;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .file-input-label:hover {
            background: #006400;
            color: white;
        }

        .preview-container {
            width: 200px;
            height: 200px;
            margin: 15px auto;
            border-radius: 10px;
            overflow: hidden;
            border: 3px solid #fff;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .preview-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .btn-upload {
            width: 100%;
            padding: 12px;
            background: #006400;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-upload:hover:not(:disabled) {
            background: #228B22;
            transform: translateY(-2px);
        }

        .btn-upload:disabled {
            background: #cccccc;
            cursor: not-allowed;
        }

        .images-section {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .images-section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 22px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .images-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .image-card {
            background: #f8f9fa;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: all 0.3s;
            position: relative;
        }

        .image-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .image-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .image-info {
            padding: 15px;
        }

        .image-type {
            display: inline-block;
            padding: 4px 8px;
            background: #006400;
            color: white;
            border-radius: 4px;
            font-size: 12px;
            margin-bottom: 10px;
        }

        .image-date {
            color: #666;
            font-size: 12px;
            margin-bottom: 10px;
        }

        .btn-delete {
            width: 100%;
            padding: 8px;
            background: #f44336;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-delete:hover {
            background: #da190b;
        }

        .status {
            padding: 12px;
            border-radius: 8px;
            margin: 15px 0;
            display: none;
            align-items: center;
            gap: 8px;
        }

        .status.show {
            display: flex;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
        }

        .status.info {
            background: #d1ecf1;
            color: #0c5460;
        }

        .loading {
            text-align: center;
            padding: 40px;
            display: none;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #006400;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 15px;
        }

        @media (max-width: 768px) {
            .admin-header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
            
            .admin-info {
                flex-direction: column;
                width: 100%;
            }
            
            .admin-email {
                width: 100%;
                text-align: center;
            }
            
            .logout-btn {
                width: 100%;
                justify-content: center;
            }
            
            .upload-grid {
                grid-template-columns: 1fr;
            }
            
            .preview-container {
                width: 150px;
                height: 150px;
            }
        }
    </style>
</head>
<body>
    <!-- Login Page -->
    <div class="login-container" id="loginContainer">
        <div class="login-header">
            <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEg2uoDdiCRQlbsyEYYACg2oAtkXr0VCXFRJi3vsEtKoOy4RA5mqlA04784903v09kSCp3YTV2vzJBsIaK0NnpKdtoVgT8vY4btXjxtfWRhUP-VzFL8KkColwJaTD9Pb9jq3cW_wdrlkx69s9MGDX3VMyjqlZS3xmIJfzLW4tz97eTf7ecDpgP_gnOZDwT8/s1024/1000038009.png" alt="Logo">
            <h2>Admin Panel</h2>
            <p>Anniversary Profile Maker</p>
        </div>

        <div class="error-message" id="errorMessage">
            <i class="fas fa-exclamation-circle"></i>
            <span id="errorText"></span>
        </div>

        <div class="info-message" id="infoMessage">
            <i class="fas fa-info-circle"></i>
            <span id="infoText"></span>
        </div>

        <form class="login-form" id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>Email Address</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" placeholder="admin@gdgcrsg.com" required>
                </div>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" id="loginBtn">
                <i class="fas fa-sign-in-alt"></i>
                <span>Login to Admin Panel</span>
            </button>
        </form>

        <p style="text-align: center; margin-top: 20px; color: #666; font-size: 12px;">
            <i class="fas fa-shield-alt"></i> Authorized access only
        </p>
    </div>

    <!-- Admin Panel -->
    <div class="admin-container" id="adminContainer">
        <div class="admin-header">
            <h1>
                <i class="fas fa-crown"></i>
                Admin Dashboard
                <i class="fas fa-crown"></i>
            </h1>
            <div class="admin-info">
                <span class="admin-email" id="adminEmail"></span>
                <button class="logout-btn" onclick="handleLogout()">
                    <i class="fas fa-sign-out-alt"></i>
                    Logout
                </button>
            </div>
        </div>

        <div class="upload-panel">
            <h2><i class="fas fa-cloud-upload-alt"></i> Upload New Images (1:1 Square Only)<p style="font-size: 14px; color:red; opacity:0.5;">[MAX:1MB]</p></h2>
            <div class="upload-grid">
                <div class="upload-card">
                    <h3><i class="fas fa-image"></i> Background Image</h3>
                    <div class="file-input-wrapper">
                        <input type="file" id="backgroundUpload" accept="image/*" onchange="previewImage(this, 'background')">
                        <label for="backgroundUpload" class="file-input-label">
                            <i class="fas fa-cloud-upload-alt"></i> Choose Background
                        </label>
                    </div>
                    <div class="preview-container">
                        <img id="backgroundPreview" src="https://via.placeholder.com/200x200?text=Preview" alt="Preview">
                    </div>
                    <button class="btn-upload" onclick="uploadImage('background')" id="uploadBackgroundBtn" disabled>
                        <i class="fas fa-upload"></i> Upload Background
                    </button>
                </div>

                <div class="upload-card">
                    <h3><i class="fas fa-frame"></i> Frame Image</h3>
                    <div class="file-input-wrapper">
                        <input type="file" id="frameUpload" accept="image/*" onchange="previewImage(this, 'frame')">
                        <label for="frameUpload" class="file-input-label">
                            <i class="fas fa-cloud-upload-alt"></i> Choose Frame
                        </label>
                    </div>
                    <div class="preview-container">
                        <img id="framePreview" src="https://via.placeholder.com/200x200?text=Preview" alt="Preview">
                    </div>
                    <button class="btn-upload" onclick="uploadImage('frame')" id="uploadFrameBtn" disabled>
                        <i class="fas fa-upload"></i> Upload Frame
                    </button>
                </div>
            </div>
            <div id="uploadStatus" class="status"></div>
        </div>

        <div class="images-section">
            <h2><i class="fas fa-database"></i> Stored Images</h2>
            <div class="loading" id="loadingImages">
                <div class="spinner"></div>
                <p>Loading images...</p>
            </div>
            <div id="imagesGrid" class="images-grid"></div>
            <div id="emptyState" class="empty-state" style="display: none;">
                <i class="fas fa-images"></i>
                <h3>No Images Found</h3>
                <p>Upload your first image using the panel above.</p>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBc-aq8jRdLyOS3dVp-FbNVvcyMMW6qhIs",
            authDomain: "gdgcrsg-anniversary.firebaseapp.com",
            databaseURL: "https://gdgcrsg-anniversary-default-rtdb.firebaseio.com",
            projectId: "gdgcrsg-anniversary",
            storageBucket: "gdgcrsg-anniversary.firebasestorage.app",
            messagingSenderId: "996440236359",
            appId: "1:996440236359:web:a02b28aa37514ae233ec62",
            measurementId: "G-M08GSW0FZY"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // State
        let currentUser = null;
        let backgroundBase64 = null;
        let frameBase64 = null;

        // Check auth state
        auth.onAuthStateChanged((user) => {
            if (user) {
                // User is signed in
                currentUser = user;
                showAdminPanel(user);
                loadImages();
            } else {
                // User is signed out
                showLoginPanel();
            }
        });

        // Handle Login
        async function handleLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const errorDiv = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');

            // Validate
            if (!email || !password) {
                showError('Please enter both email and password');
                return;
            }

            // Disable button
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
            hideError();

            try {
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                console.log('Login successful:', userCredential.user.email);
            } catch (error) {
                console.error('Login error:', error);
                
                let errorMessage = 'Login failed. ';
                switch (error.code) {
                    case 'auth/user-not-found':
                        errorMessage += 'Admin account not found.';
                        break;
                    case 'auth/wrong-password':
                        errorMessage += 'Incorrect password.';
                        break;
                    case 'auth/invalid-email':
                        errorMessage += 'Invalid email format.';
                        break;
                    case 'auth/too-many-requests':
                        errorMessage += 'Too many failed attempts. Try again later.';
                        break;
                    default:
                        errorMessage += error.message;
                }
                
                showError(errorMessage);
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login to Admin Panel';
            }
        }

        // Handle Logout
        async function handleLogout() {
            try {
                await auth.signOut();
                showLoginPanel();
            } catch (error) {
                console.error('Logout error:', error);
                showError('Logout failed: ' + error.message);
            }
        }

        // Show Admin Panel
        function showAdminPanel(user) {
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('adminContainer').style.display = 'block';
            document.getElementById('adminEmail').textContent = user.email;
        }

        // Show Login Panel
        function showLoginPanel() {
            document.getElementById('loginContainer').style.display = 'block';
            document.getElementById('adminContainer').style.display = 'none';
            document.getElementById('loginBtn').disabled = false;
            document.getElementById('loginBtn').innerHTML = '<i class="fas fa-sign-in-alt"></i> Login to Admin Panel';
            document.getElementById('email').value = '';
            document.getElementById('password').value = '';
            hideError();
        }

        // Preview Image
        function previewImage(input, type) {
            const file = input.files[0];
            if (!file) return;

            // Check image dimensions
            const img = new Image();
            img.onload = function() {
                // Check if image is square (1:1) with 10px tolerance
                if (Math.abs(img.width - img.height) > 10) {
                    alert('❌ দয়া করে 1:1 অনুপাতের (বর্গাকার) ছবি আপলোড করুন।\nPlease upload a square (1:1 ratio) image.');
                    input.value = '';
                    document.getElementById(type === 'background' ? 'uploadBackgroundBtn' : 'uploadFrameBtn').disabled = true;
                    return;
                }

                // Convert to base64
                const reader = new FileReader();
                reader.onload = function(e) {
                    const base64 = e.target.result;
                    
                    if (type === 'background') {
                        backgroundBase64 = base64;
                        document.getElementById('backgroundPreview').src = base64;
                        document.getElementById('uploadBackgroundBtn').disabled = false;
                    } else {
                        frameBase64 = base64;
                        document.getElementById('framePreview').src = base64;
                        document.getElementById('uploadFrameBtn').disabled = false;
                    }
                };
                reader.readAsDataURL(file);
            };
            img.src = URL.createObjectURL(file);
        }

        // Upload Image
        async function uploadImage(type) {
            if (!currentUser) {
                alert('Please login first');
                return;
            }

            const base64 = type === 'background' ? backgroundBase64 : frameBase64;
            if (!base64) {
                alert('Please select an image first');
                return;
            }

            const uploadBtn = document.getElementById(type === 'background' ? 'uploadBackgroundBtn' : 'uploadFrameBtn');
            const statusDiv = document.getElementById('uploadStatus');

            uploadBtn.disabled = true;
            showStatus('Uploading...', 'info');

            try {
                // Create image document
                const imageData = {
                    type: type,
                    imageBase64: base64,
                    uploadedAt: firebase.firestore.FieldValue.serverTimestamp(),
                    uploadedBy: currentUser.email,
                    fileName: `${type}_${Date.now()}.png`
                };

                // Save to Firestore
                const docRef = await db.collection('profileMakerImages').add(imageData);
                
                showStatus('✅ Image uploaded successfully!', 'success');
                
                // Reset preview
                if (type === 'background') {
                    document.getElementById('backgroundUpload').value = '';
                    document.getElementById('backgroundPreview').src = 'https://via.placeholder.com/200x200?text=Preview';
                    backgroundBase64 = null;
                } else {
                    document.getElementById('frameUpload').value = '';
                    document.getElementById('framePreview').src = 'https://via.placeholder.com/200x200?text=Preview';
                    frameBase64 = null;
                }
                
                uploadBtn.disabled = true;
                
                // Reload images
                loadImages();
                
                // Hide status after 3 seconds
                setTimeout(() => {
                    statusDiv.classList.remove('show');
                }, 3000);
                
            } catch (error) {
                console.error('Upload error:', error);
                showStatus('❌ Error: ' + error.message, 'error');
                uploadBtn.disabled = false;
            }
        }

        // Load Images
        async function loadImages() {
            if (!currentUser) return;

            document.getElementById('loadingImages').classList.add('show');
            document.getElementById('imagesGrid').innerHTML = '';
            document.getElementById('emptyState').style.display = 'none';

            try {
                const snapshot = await db.collection('profileMakerImages')
                    .orderBy('uploadedAt', 'desc')
                    .get();

                document.getElementById('loadingImages').classList.remove('show');

                if (snapshot.empty) {
                    document.getElementById('emptyState').style.display = 'block';
                    return;
                }

                const grid = document.getElementById('imagesGrid');
                grid.innerHTML = '';

                snapshot.forEach(doc => {
                    const data = doc.data();
                    const card = createImageCard(doc.id, data);
                    grid.appendChild(card);
                });

            } catch (error) {
                console.error('Load error:', error);
                document.getElementById('loadingImages').classList.remove('show');
                document.getElementById('emptyState').style.display = 'block';
                document.getElementById('emptyState').innerHTML = `
                    <i class="fas fa-exclamation-triangle"></i>
                    <h3>Error Loading Images</h3>
                    <p>${error.message}</p>
                `;
            }
        }

        // Create Image Card
        function createImageCard(id, data) {
            const card = document.createElement('div');
            card.className = 'image-card';

            const img = document.createElement('img');
            img.src = data.imageBase64;
            img.alt = data.type;

            const info = document.createElement('div');
            info.className = 'image-info';

            const typeBadge = document.createElement('span');
            typeBadge.className = 'image-type';
            typeBadge.innerHTML = data.type === 'background' ? 
                '<i class="fas fa-image"></i> Background' : 
                '<i class="fas fa-frame"></i> Frame';

            const dateDiv = document.createElement('div');
            dateDiv.className = 'image-date';
            if (data.uploadedAt) {
                const date = data.uploadedAt.toDate();
                dateDiv.innerHTML = `<i class="far fa-calendar"></i> ${date.toLocaleDateString()} ${date.toLocaleTimeString()}`;
            } else {
                dateDiv.innerHTML = '<i class="far fa-clock"></i> Just now';
            }

            const uploadedBy = document.createElement('div');
            uploadedBy.className = 'image-date';
            uploadedBy.innerHTML = `<i class="far fa-user"></i> ${data.uploadedBy || 'Admin'}`;

            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'btn-delete';
            deleteBtn.innerHTML = '<i class="fas fa-trash"></i> Delete';
            deleteBtn.onclick = () => deleteImage(id);

            info.appendChild(typeBadge);
            info.appendChild(dateDiv);
            info.appendChild(uploadedBy);
            info.appendChild(deleteBtn);

            card.appendChild(img);
            card.appendChild(info);

            return card;
        }

        // Delete Image
        async function deleteImage(id) {
            if (!confirm('Are you sure you want to delete this image?')) {
                return;
            }

            try {
                await db.collection('profileMakerImages').doc(id).delete();
                showStatus('✅ Image deleted successfully!', 'success');
                loadImages();
                
                setTimeout(() => {
                    document.getElementById('uploadStatus').classList.remove('show');
                }, 3000);
                
            } catch (error) {
                console.error('Delete error:', error);
                showStatus('❌ Error: ' + error.message, 'error');
            }
        }

        // Helper Functions
        function showError(message) {
            document.getElementById('errorText').textContent = message;
            document.getElementById('errorMessage').classList.add('show');
        }

        function hideError() {
            document.getElementById('errorMessage').classList.remove('show');
        }

        function showStatus(message, type) {
            const statusDiv = document.getElementById('uploadStatus');
            statusDiv.textContent = message;
            statusDiv.className = 'status ' + type + ' show';
        }

        // Prevent form submission on enter in admin panel
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && document.getElementById('adminContainer').style.display === 'block') {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
